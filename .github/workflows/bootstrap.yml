name: bootstrap repository

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify and extract repository
        run: |
          base64 -d .bootstrap/payload.b64 > /tmp/autocad-skill.tar.gz
          echo "270e7950a0f83cb69bbac3bd7bdc3e70585a78327b31cded9d017dc9532684b9  /tmp/autocad-skill.tar.gz" | sha256sum -c -
          tar -xzf /tmp/autocad-skill.tar.gz -C .
          rm -rf .bootstrap .github/workflows/bootstrap.yml
      - name: Publish repository files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import initial alpha release"
          git push origin main
